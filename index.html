<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SealLaw</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background-color: #0b2e1e;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 80px;
  background-color: #0b2e1e;
  animation: fadeDown 1s ease forwards;
}

.logo {
  font-size: 26px;
  font-weight: bold;
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: white;
  font-weight: 500;
  transition: 0.3s ease;
}

.nav-links a:hover {
  color: #7bd389;
}

.signup-btn {
  background-color: #7bd389;
  padding: 8px 18px;
  border-radius: 20px;
  color: black !important;
  font-weight: 600;
}

/* HERO */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(11,46,30,0.85), rgba(11,46,30,0.85)),
  url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 20px;
}

.hero-content h1 {
  font-size: 60px;
  font-weight: bold;
  margin-bottom: 20px;
  animation: fadeUp 1.2s ease forwards;
}

.hero-content p {
  font-size: 22px;
  color: #cfd8d3;
  margin-bottom: 40px;
  animation: fadeUp 1.5s ease forwards;
}

/* BUTTON */
.try-btn {
  background-color: #7bd389;
  color: black;
  padding: 16px 40px;
  font-size: 18px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  display: inline-block;
  animation: fadeUp 1.8s ease forwards, pulse 2s infinite;
  transition: 0.3s ease;
}

.try-btn:hover {
  background-color: #5ec56e;
  transform: scale(1.05);
  box-shadow: 0 0 20px #7bd389;
}

/* ANIMATIONS */
@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SealLaw</div>
  <div class="nav-links">
    <a href="#">Sign In</a>
    <a href="#" class="signup-btn">Sign Up</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Introducing SealLaw</h1>
    <p>AI-powered legal intelligence designed for professionals.</p>
    <a href="dashboard.html" class="try-btn">Try SealLaw →</a>
  </div>
</div>

</body>
</html>
